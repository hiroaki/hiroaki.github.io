    <h1>Tilia</h1>

    <p>
      Tilia （仮称）は <a href="https://github.com/hiroaki/maps.gpx">maps.gpx</a> の後継を目指す、静的ファイルのみで動作する地図ライブラリ（フレームワーク）です。
    </p>

    <p>
      リポジトリは準備中です。次のリンクから、動作するサンプルを試すことができます：
    </p>

    <ul>
      <li><a href="/Tilia/embed/">埋め込みのサンプル</a><br>地図をページに埋め込む利用法です。テンプレートに Tilia の地図を埋め込み、データだけ差し替えることで、複数のコンテンツに対応できます。</li>
      <li><a href="/Tilia/viewer/">ビューワーのサンプル</a><br>地図アプリの基盤とする利用法です。このサンプルでは GPX と JPG ファイルをドラッグ＆ドロップで入力できます。</li>
    </ul>
  </body>
</html>
